name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Dummy values for steps that load modules which read env at init
      # or that Next.js calls while prerendering pages.
      # - DATABASE_URL: prisma.config.ts evaluates env("DATABASE_URL") at
      #   load time, and lib/prisma.ts instantiates pg.Pool at module init.
      # - STRIPE_SECRET_KEY: app/actions.ts and the Stripe webhook route
      #   instantiate `new Stripe(process.env.STRIPE_SECRET_KEY!, ...)`
      #   at module init; a non-empty placeholder satisfies the SDK.
      # - NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY:
      #   utils/supabase/{client,server}.ts throw synchronously when
      #   these are missing, which fires during `next build` while it
      #   collects page data for prerendering (e.g. /admin/login).
      # None of these need to point at a real service — nothing connects
      # during lint or build, only at runtime.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      NEXT_PUBLIC_SITE_URL: https://matlandgard.no
      NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.invalid
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_dummy_anon_key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
